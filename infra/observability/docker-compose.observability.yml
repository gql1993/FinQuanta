services:
  loki:
    image: grafana/loki:3.1.0
    container_name: finquanta-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.0
    container_name: finquanta-promtail
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    depends_on:
      - loki
    volumes:
      - ./promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - ../../logs:/var/log/finquanta:ro
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.5.0
    container_name: finquanta-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4318:4318"
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: finquanta-grafana
    depends_on:
      - loki
      - tempo
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${FINQUANTA_GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${FINQUANTA_GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/provisioning/dashboards_json:/var/lib/grafana/dashboards/finquanta:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  tempo-data:
  grafana-data:
